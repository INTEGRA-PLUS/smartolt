# =============================================================================
# SmartOLT Gateway — Production Docker Compose
# =============================================================================
#
# Usage:
#   docker compose up -d                          # producción
#   docker compose --profile dev up -d            # + pgAdmin + Redis Commander
#   docker compose --profile migrate run --rm migrate   # solo migraciones
#
# Requisitos previos:
#   1. Copiar .env.example a .env y completar TODOS los valores obligatorios
#   2. Las redes y volúmenes se crean automáticamente con docker compose up
#
# Variables obligatorias en .env:
#   POSTGRES_PASSWORD, REDIS_PASSWORD, JWT_SECRET, API_KEY_SALT
#
# Arquitectura:
#   Nginx (host)  ─→  127.0.0.1:3001  ─→  container smartolt_api:3000
#
#   Nginx del sistema hace de reverse proxy + TLS.
#   La API NO se expone a internet directamente.
# =============================================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "10"
    tag: "{{.Name}}"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

services:

  # ───────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ───────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartolt_postgres
    restart: unless-stopped
    init: true
    stop_grace_period: 60s

    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-smartolt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-smartolt_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro   # scripts opcionales de init

    expose: ["5432"]
    # Puerto accesible solo desde el propio servidor (SSH tunnel desde tu PC)
    # Usamos 5433 para no chocar con otros Postgres que ya corran en el host
    ports:
      - "127.0.0.1:${POSTGRES_LOCAL_PORT:-5433}:5432"

    healthcheck:
      <<: *healthcheck-defaults
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-smartolt} -d ${POSTGRES_DB:-smartolt_db}

    networks: [smartolt_internal]
    logging: *logging

    security_opt: [no-new-privileges:true]

    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1g}
        reservations:
          memory: 256m

    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

  # ───────────────────────────────────────────────────────────────────────────
  # Redis 7
  # ───────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartolt_redis
    restart: unless-stopped
    init: true
    stop_grace_period: 30s

    # Inyectar REDIS_PASSWORD al entorno del contenedor para el healthcheck.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-512mb}
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --save
      - "60 10000"
      - --loglevel
      - notice
      - --protected-mode
      - "yes"
      - --tcp-backlog
      - "511"
      - --timeout
      - "300"
      - --tcp-keepalive
      - "60"

    volumes:
      - redis_data:/data

    expose: ["6379"]

    healthcheck:
      <<: *healthcheck-defaults
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG

    networks: [smartolt_internal]
    logging: *logging

    security_opt: [no-new-privileges:true]

    sysctls:
      net.core.somaxconn: 511

    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-768m}
        reservations:
          memory: 128m

    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

  # ───────────────────────────────────────────────────────────────────────────
  # Migraciones Prisma (job efímero, no queda corriendo)
  # Ejecutar con: docker compose --profile migrate run --rm migrate
  # También corre automáticamente antes del API en el arrange de CI/CD
  # ───────────────────────────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runner
    image: smartolt-gateway:${IMAGE_TAG:-latest}
    container_name: smartolt_migrate
    profiles: [migrate]
    restart: "no"

    command: ["npx", "prisma", "migrate", "deploy"]

    environment:
      NODE_ENV: production
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-smartolt}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smartolt_db}?schema=public

    depends_on:
      postgres:
        condition: service_healthy

    networks: [smartolt_internal]
    logging: *logging

  # ───────────────────────────────────────────────────────────────────────────
  # SmartOLT Gateway API
  # ───────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runner
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_SHA:    ${GIT_SHA:-unknown}
        VERSION:    ${VERSION:-1.0.0}
    image: smartolt-gateway:${IMAGE_TAG:-latest}
    container_name: smartolt_api
    restart: unless-stopped
    init: true
    stop_grace_period: 30s

    env_file: [.env]
    environment:
      NODE_ENV:     production
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-smartolt}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smartolt_db}?schema=public
      REDIS_HOST:     redis
      REDIS_PORT:     "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_HOST:       0.0.0.0
      APP_PORT:       "3000"

    # Expone el puerto SOLO al loopback del host (127.0.0.1)
    # Tu Nginx del host hace de reverse proxy hacia este puerto.
    # Nada fuera del servidor puede llegar directo a la API.
    ports:
      - "127.0.0.1:${API_PORT_HOST:-3001}:3000"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      <<: *healthcheck-defaults
      interval: 30s
      start_period: 45s
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:3000/live

    networks: [smartolt_internal]
    logging: *logging

    security_opt: [no-new-privileges:true]
    tmpfs:
      - "/tmp:size=128m,mode=1777"

    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512m}
          cpus:   "${API_CPU_LIMIT:-1.0}"
        reservations:
          memory: 128m
          cpus:   "0.25"

  # ───────────────────────────────────────────────────────────────────────────
  # Redis Commander   (solo con --profile dev)
  # Acceso: http://localhost:8081
  # ───────────────────────────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: smartolt_redis_ui
    restart: unless-stopped
    profiles: [dev]

    environment:
      REDIS_HOSTS:   "local:redis:6379:0:${REDIS_PASSWORD}"
      HTTP_USER:     ${REDIS_COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-admin}

    ports: ["127.0.0.1:8081:8081"]

    depends_on:
      redis:
        condition: service_healthy

    networks: [smartolt_internal]
    logging: *logging

  # ───────────────────────────────────────────────────────────────────────────
  # pgAdmin 4   (solo con --profile dev)
  # Acceso: http://localhost:8080
  # ───────────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartolt_pgadmin
    restart: unless-stopped
    profiles: [dev]

    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@smartolt.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT:      "80"

    ports: ["127.0.0.1:5050:80"]

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks: [smartolt_internal]
    logging: *logging

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local

  redis_data:
    driver: local

  pgadmin_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  # Red bridge para todos los servicios del stack.
  # Postgres y Redis usan `expose:` (no `ports:`) → no son accesibles
  # desde el host ni desde internet, solo desde otros containers.
  # La API sí necesita salida a internet (llama a SmartOLT API externa).
  smartolt_internal:
    driver: bridge
